<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mewe La Poisa Kot Jaishe? 💸</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Righteous&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0520; font-family: 'Nunito', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    select option { background: #1c0932; color: #fff; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const GUILTY_THRESHOLD = 500;
    const FIXED_COST_CATEGORIES = ["🏠 Home", "💊 Health", "🚗 Transport", "📚 Education"];

    const categories = [
      "🛒 Groceries", "🍔 Food & Dining", "👗 Shopping", "💄 Beauty",
      "🚗 Transport", "💊 Health", "🎉 Entertainment", "📱 Bills & Subscriptions",
      "✈️ Travel", "🎁 Gifts", "📚 Education", "🏠 Home", "😏 Other"
    ];

    const funnyDeleteMessages = [
      "🚨 Don't hide expenses! Be honest, Mewe! 😤",
      "👀 Deleting won't undo the damage to your wallet!",
      "🤥 The receipt already exists bestie...",
      "😂 Nice try! But your bank knows what you did.",
      "🙈 Mewe... we see you trying to look innocent!",
    ];

    const guiltyPopupMessages = [
      "👀 AED 500+?! Mewe... we need to talk.",
      "🚨 Wallet emergency detected! Was this really necessary?",
      "😳 Mewe la poisa kot gayo?! THIS is where!",
      "💸 Your future self is shaking right now...",
    ];

    function getWeekKey(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(d);
      monday.setDate(diff);
      return monday.toISOString().split("T")[0];
    }
    function getCurrentWeekKey() {
      return getWeekKey(new Date().toISOString().split("T")[0]);
    }

    function aiInsights(expenses, salary) {
      if (!expenses.length) return ["No expenses recorded this month! Mewe was suspiciously responsible. 🤔"];
      const total = expenses.reduce((s, e) => s + e.amount, 0);
      const pct = ((total / salary) * 100).toFixed(1);
      const cats = {};
      expenses.forEach(e => { cats[e.category] = (cats[e.category] || 0) + e.amount; });
      const varCats = Object.entries(cats).filter(([c]) => !FIXED_COST_CATEGORIES.includes(c)).sort((a, b) => b[1] - a[1]);
      return [
        `💰 ${pct}% of salary spent. ${pct > 80 ? "Mewe... slow down! 😭" : pct > 50 ? "Half the salary gone! 🙈" : "Solid month! 🎉"}`,
        varCats[0] ? `📊 Biggest flexible spend: ${varCats[0][0]} (AED ${varCats[0][1].toFixed(2)}). ${varCats[0][1] > salary * 0.25 ? "Consider cutting back here next month 👀" : "Looking reasonable!"}` : "",
        expenses.filter(e => e.guilty).length > 0 ? `😬 ${expenses.filter(e => e.guilty).length} guilty purchase(s) this month. Mewe knows what she did. 😂` : "✨ Zero guilty expenses this month! Angel behaviour 😇",
        total < salary * 0.6 ? "🌟 Mewe saved a good chunk this month! Keep it up!" : total > salary * 0.9 ? "⚠️ Almost everything spent! Next month: budgeting time 💪" : "",
      ].filter(Boolean);
    }

    const labelStyle = { fontSize: "12px", fontWeight: 800, color: "rgba(255,255,255,0.55)", textTransform: "uppercase", letterSpacing: "0.8px", display: "block", marginBottom: "6px" };
    const inputStyle = { width: "100%", background: "rgba(255,255,255,0.08)", border: "1.5px solid rgba(255,255,255,0.15)", borderRadius: "12px", padding: "12px 14px", color: "#fff", fontSize: "15px", fontFamily: "'Nunito', sans-serif", boxSizing: "border-box", outline: "none" };
    const btnPrimary = { width: "100%", background: "linear-gradient(135deg, #f472b6, #a855f7)", border: "none", borderRadius: "14px", padding: "15px", color: "#fff", fontSize: "16px", fontWeight: 900, cursor: "pointer", fontFamily: "'Nunito', sans-serif" };
    const btnSecondary = { background: "rgba(255,255,255,0.1)", border: "1.5px solid rgba(255,255,255,0.18)", borderRadius: "14px", padding: "13px", color: "#fff", fontSize: "14px", fontWeight: 700, cursor: "pointer", fontFamily: "'Nunito', sans-serif" };

    function Modal({ children, onClose }) {
      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.78)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(6px)" }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "linear-gradient(160deg, #1c0932, #271348)", borderRadius: "28px 28px 0 0", padding: "28px 22px 44px", width: "100%", maxWidth: "480px", maxHeight: "88vh", overflowY: "auto", boxShadow: "0 -8px 40px rgba(0,0,0,0.5)" }}>
            {children}
          </div>
        </div>
      );
    }

    function MonthReport({ archive, onClose }) {
      const { month, expenses, salary, savedAmount } = archive;
      const total = expenses.reduce((s, e) => s + e.amount, 0);
      const cats = {};
      expenses.forEach(e => { cats[e.category] = (cats[e.category] || 0) + e.amount; });
      const insights = aiInsights(expenses, salary);
      const guiltyList = expenses.filter(e => e.guilty);

      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.82)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(6px)" }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "linear-gradient(160deg, #1c0932, #271348)", borderRadius: "28px 28px 0 0", padding: "28px 22px 44px", width: "100%", maxWidth: "480px", maxHeight: "92vh", overflowY: "auto", boxShadow: "0 -8px 40px rgba(0,0,0,0.5)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
              <div>
                <div style={{ fontSize: "11px", fontWeight: 800, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "1px" }}>Archive Report</div>
                <div style={{ fontSize: "22px", fontWeight: 900, color: "#f0e6ff", marginTop: "2px" }}>{month} 📦</div>
              </div>
              <button onClick={onClose} style={{ background: "rgba(255,255,255,0.1)", border: "none", borderRadius: "10px", padding: "8px 14px", color: "#fff", fontWeight: 800, fontSize: "13px", cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>✕ Close</button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "8px", marginBottom: "16px" }}>
              {[
                { label: "Salary", value: `AED ${salary.toLocaleString()}`, icon: "💰", color: "#a78bfa" },
                { label: "Spent", value: `AED ${total.toFixed(0)}`, icon: "💸", color: "#fbbf24" },
                { label: "Saved", value: `AED ${(savedAmount || 0).toFixed(0)}`, icon: "🏦", color: "#6ee7b7" },
              ].map(s => (
                <div key={s.label} style={{ background: "rgba(255,255,255,0.06)", borderRadius: "14px", padding: "12px 8px", textAlign: "center", border: "1px solid rgba(255,255,255,0.08)" }}>
                  <div style={{ fontSize: "20px" }}>{s.icon}</div>
                  <div style={{ fontSize: "12px", fontWeight: 900, marginTop: "4px", color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: "10px", opacity: 0.45, marginTop: "2px", fontWeight: 800, textTransform: "uppercase" }}>{s.label}</div>
                </div>
              ))}
            </div>

            <div style={{ background: "rgba(0,0,0,0.25)", borderRadius: "20px", overflow: "hidden", height: "8px", marginBottom: "6px" }}>
              <div style={{ height: "100%", background: "linear-gradient(90deg, #fbbf24, #f472b6)", width: `${Math.min((total / salary) * 100, 100)}%`, borderRadius: "20px" }} />
            </div>
            <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.4)", fontWeight: 700, marginBottom: "18px", textAlign: "right" }}>{((total / salary) * 100).toFixed(1)}% of salary spent</div>

            {Object.keys(cats).length > 0 && (
              <>
                <div style={{ fontSize: "11px", fontWeight: 800, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "8px" }}>Spending Breakdown</div>
                {Object.entries(cats).sort((a, b) => b[1] - a[1]).map(([cat, amt]) => {
                  const fixed = FIXED_COST_CATEGORIES.includes(cat);
                  return (
                    <div key={cat} style={{ background: fixed ? "rgba(168,85,247,0.07)" : "rgba(255,255,255,0.05)", borderRadius: "12px", padding: "11px 14px", marginBottom: "6px", display: "flex", justifyContent: "space-between", alignItems: "center", border: fixed ? "1px solid rgba(168,85,247,0.14)" : "1px solid rgba(255,255,255,0.06)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "7px" }}>
                        <span style={{ fontSize: "13px", fontWeight: 800, color: "#e2d9f3" }}>{cat}</span>
                        {fixed && <span style={{ fontSize: "9px", background: "rgba(168,85,247,0.2)", color: "#c4b5fd", padding: "2px 6px", borderRadius: "6px", fontWeight: 800 }}>FIXED</span>}
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontWeight: 900, fontSize: "13px", color: fixed ? "#c4b5fd" : "#fbbf24" }}>AED {amt.toFixed(2)}</div>
                        <div style={{ fontSize: "10px", color: "rgba(255,255,255,0.3)", fontWeight: 700 }}>{total > 0 ? ((amt / total) * 100).toFixed(0) : 0}%</div>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            {guiltyList.length > 0 && (
              <>
                <div style={{ fontSize: "11px", fontWeight: 800, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "1px", margin: "16px 0 8px" }}>Guilty Purchases 😬</div>
                {guiltyList.map(exp => (
                  <div key={exp.id} style={{ background: "rgba(255,80,80,0.07)", borderRadius: "12px", padding: "11px 14px", marginBottom: "6px", display: "flex", justifyContent: "space-between", border: "1px solid rgba(255,80,80,0.14)" }}>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: "13px", color: "#f0e6ff" }}>{exp.name}</div>
                      <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.35)", marginTop: "2px", fontWeight: 700 }}>{exp.category}</div>
                    </div>
                    <div style={{ fontWeight: 900, fontSize: "14px", color: "#ff9090" }}>AED {exp.amount.toFixed(2)}</div>
                  </div>
                ))}
              </>
            )}

            <div style={{ background: "linear-gradient(135deg, rgba(109,40,217,0.22), rgba(192,38,211,0.14))", borderRadius: "18px", padding: "18px", marginTop: "16px", border: "1px solid rgba(244,114,182,0.18)" }}>
              <div style={{ fontSize: "15px", fontWeight: 900, marginBottom: "12px", color: "#f0e6ff" }}>🤖 Money Coach's Verdict:</div>
              {insights.map((tip, i) => (
                <div key={i} style={{ fontSize: "13px", lineHeight: 1.65, marginBottom: "8px", padding: "10px 12px", background: "rgba(255,255,255,0.05)", borderRadius: "10px", fontWeight: 700, color: "#ddd6fe" }}>{tip}</div>
              ))}
            </div>

            {expenses.length > 0 && (
              <>
                <div style={{ fontSize: "11px", fontWeight: 800, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "1px", margin: "16px 0 8px" }}>All Expenses ({expenses.length})</div>
                {expenses.map(exp => (
                  <div key={exp.id} style={{ background: "rgba(255,255,255,0.04)", borderRadius: "10px", padding: "10px 12px", marginBottom: "5px", display: "flex", justifyContent: "space-between", border: "1px solid rgba(255,255,255,0.06)" }}>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: "13px", color: "#e2d9f3" }}>{exp.name}</div>
                      <div style={{ fontSize: "10px", color: "rgba(255,255,255,0.35)", marginTop: "2px", fontWeight: 700 }}>{exp.category} · {exp.date}</div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                      {exp.guilty && <span style={{ fontSize: "9px", background: "rgba(255,80,80,0.18)", color: "#ff9090", padding: "2px 6px", borderRadius: "6px", fontWeight: 800 }}>GUILTY</span>}
                      <span style={{ fontWeight: 900, fontSize: "13px", color: exp.isFixed ? "#c4b5fd" : "#fbbf24" }}>AED {exp.amount.toFixed(2)}</span>
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [salary, setSalary] = useState(null);
      const [salaryInput, setSalaryInput] = useState("");
      const [salaryDate, setSalaryDate] = useState(new Date().toISOString().split("T")[0]);
      const [expenses, setExpenses] = useState([]);
      const [guiltyExpenses, setGuiltyExpenses] = useState([]);
      const [savings, setSavings] = useState([]);
      const [totalSavings, setTotalSavings] = useState(0);
      const [archives, setArchives] = useState([]);
      const [selectedArchive, setSelectedArchive] = useState(null);
      const [showSalaryModal, setShowSalaryModal] = useState(false);
      const [showAddExpense, setShowAddExpense] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(null);
      const [showGuiltyModal, setShowGuiltyModal] = useState(null);
      const [showSavingsAdjust, setShowSavingsAdjust] = useState(null);
      const [savingsAdjustInput, setSavingsAdjustInput] = useState("");
      const [editNoteId, setEditNoteId] = useState(null);
      const [noteInput, setNoteInput] = useState("");
      const [reportView, setReportView] = useState("current");
      const [reportSubView, setReportSubView] = useState("monthly");
      const [expenseForm, setExpenseForm] = useState({ name: "", amount: "", category: categories[0], date: new Date().toISOString().split("T")[0] });

      const currentWeekKey = getCurrentWeekKey();
      const weeklyExpenses = expenses.filter(e => getWeekKey(e.date) === currentWeekKey);
      const totalSpent = expenses.reduce((s, e) => s + e.amount, 0);
      const remaining = salary ? salary - totalSpent : 0;

      const addExpense = () => {
        if (!expenseForm.name || !expenseForm.amount) return;
        const amt = parseFloat(expenseForm.amount);
        const isFixed = FIXED_COST_CATEGORIES.includes(expenseForm.category);
        const newExp = { ...expenseForm, amount: amt, id: Date.now(), isFixed };
        if (amt >= GUILTY_THRESHOLD && !isFixed) {
          setShowGuiltyModal(newExp);
        } else {
          setExpenses(prev => [newExp, ...prev]);
        }
        setExpenseForm({ name: "", amount: "", category: categories[0], date: new Date().toISOString().split("T")[0] });
        setShowAddExpense(false);
      };

      const handleGuiltyResponse = (response, expense) => {
        if (response === "guilty") {
          setGuiltyExpenses(prev => [{ ...expense, guiltyAt: new Date().toISOString(), note: "" }, ...prev]);
          setExpenses(prev => [{ ...expense, guilty: true }, ...prev]);
        } else {
          setExpenses(prev => [{ ...expense, guilty: false, worthIt: response === "yes" }, ...prev]);
        }
        setShowGuiltyModal(null);
      };

      const confirmDelete = (id) => {
        setExpenses(prev => prev.filter(e => e.id !== id));
        setShowDeleteModal(null);
      };

      const handleNewSalary = () => {
        if (!salaryInput) return;
        const newSal = parseFloat(salaryInput);
        if (salary !== null) {
          const leftover = Math.max(salary - totalSpent, 0);
          const monthLabel = new Date(salaryDate).toLocaleString("default", { month: "long", year: "numeric" });
          setArchives(prev => [{ month: monthLabel, expenses: [...expenses], salary, savedAmount: leftover, id: Date.now() }, ...prev]);
          if (leftover > 0) {
            const entry = { month: monthLabel, amount: leftover, date: salaryDate, id: Date.now() + 1 };
            setSavings(prev => [entry, ...prev]);
            setTotalSavings(prev => prev + leftover);
            setShowSavingsAdjust(entry);
            setSavingsAdjustInput(leftover.toFixed(2));
          }
        }
        setSalary(newSal);
        setSalaryDate(salaryDate);
        setExpenses([]);
        setSalaryInput("");
        setShowSalaryModal(false);
      };

      const adjustSavings = () => {
        const adjusted = parseFloat(savingsAdjustInput);
        if (isNaN(adjusted) || !showSavingsAdjust) return;
        setSavings(prev => prev.map(s => s.id === showSavingsAdjust.id ? { ...s, amount: adjusted } : s));
        setTotalSavings(prev => prev - showSavingsAdjust.amount + adjusted);
        setShowSavingsAdjust(null);
      };

      const saveNote = (id) => {
        setGuiltyExpenses(prev => prev.map(g => g.id === id ? { ...g, note: noteInput } : g));
        setEditNoteId(null); setNoteInput("");
      };

      const getDailyExpenses = () => expenses.filter(e => e.date === new Date().toISOString().split("T")[0]);
      const getWeeklyExpenses = () => { const w = new Date(Date.now() - 7 * 86400000); return expenses.filter(e => new Date(e.date) >= w); };

      const insights = salary ? aiInsights(expenses, salary) : [];
      const deleteMsg = funnyDeleteMessages[Math.floor(Math.random() * funnyDeleteMessages.length)];
      const guiltyMsg = guiltyPopupMessages[Math.floor(Math.random() * guiltyPopupMessages.length)];

      const catBreakdown = {};
      expenses.forEach(e => { catBreakdown[e.category] = (catBreakdown[e.category] || 0) + e.amount; });

      return (
        <div style={{ fontFamily: "'Nunito', sans-serif", minHeight: "100vh", background: "linear-gradient(145deg, #0f0520 0%, #1a0a35 50%, #0d1a30 100%)", color: "#fff", position: "relative" }}>
          <div style={{ position: "fixed", top: "-80px", right: "-80px", width: "350px", height: "350px", borderRadius: "50%", background: "radial-gradient(circle, rgba(244,114,182,0.15), transparent 70%)", pointerEvents: "none", zIndex: 0 }} />
          <div style={{ position: "fixed", bottom: "-80px", left: "-80px", width: "350px", height: "350px", borderRadius: "50%", background: "radial-gradient(circle, rgba(168,85,247,0.12), transparent 70%)", pointerEvents: "none", zIndex: 0 }} />

          <div style={{ maxWidth: "480px", margin: "0 auto", padding: "0 0 100px 0", minHeight: "100vh", position: "relative", zIndex: 1 }}>

            {/* HEADER */}
            <div style={{ padding: "28px 20px 14px", textAlign: "center" }}>
              <div style={{ fontFamily: "'Righteous', cursive", fontSize: "30px", lineHeight: 1.2, background: "linear-gradient(90deg, #f472b6, #fb923c, #fbbf24)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Mewe La Poisa</div>
              <div style={{ fontFamily: "'Righteous', cursive", fontSize: "26px", lineHeight: 1.2, background: "linear-gradient(90deg, #fbbf24, #a78bfa, #f472b6)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Kot Jaishe? 😂💸</div>
              <div style={{ marginTop: "6px", fontSize: "11px", color: "rgba(255,255,255,0.3)", fontWeight: 800, letterSpacing: "1.5px", textTransform: "uppercase" }}>Mewe's Personal Finance Tracker</div>
            </div>

            {/* HOME */}
            {screen === "home" && (
              <div style={{ padding: "0 16px" }}>
                {!salary ? (
                  <div onClick={() => setShowSalaryModal(true)} style={{ background: "linear-gradient(135deg, #f472b6, #a855f7)", borderRadius: "22px", padding: "30px", textAlign: "center", cursor: "pointer", marginBottom: "16px", boxShadow: "0 10px 40px rgba(244,114,182,0.3)" }}>
                    <div style={{ fontSize: "48px", marginBottom: "10px" }}>💰</div>
                    <div style={{ fontSize: "20px", fontWeight: 900 }}>Add Your Salary</div>
                    <div style={{ fontSize: "13px", opacity: 0.85, marginTop: "6px", fontWeight: 700 }}>Tap to log this month's salary 👇</div>
                  </div>
                ) : (
                  <div style={{ background: "linear-gradient(135deg, #6d28d9, #a855f7, #ec4899)", borderRadius: "22px", padding: "22px", marginBottom: "16px", boxShadow: "0 10px 40px rgba(168,85,247,0.25)" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div>
                        <div style={{ fontSize: "11px", fontWeight: 800, letterSpacing: "1.5px", textTransform: "uppercase", opacity: 0.75 }}>Monthly Salary 💰</div>
                        <div style={{ fontSize: "36px", fontWeight: 900, marginTop: "4px", letterSpacing: "-1px" }}>AED {salary.toLocaleString()}</div>
                        <div style={{ fontSize: "12px", opacity: 0.65, marginTop: "2px", fontWeight: 700 }}>📅 Received: {salaryDate}</div>
                      </div>
                      <button onClick={() => setShowSalaryModal(true)} style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: "12px", padding: "9px 14px", color: "#fff", fontSize: "12px", fontWeight: 900, cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>New Month</button>
                    </div>
                    <div style={{ marginTop: "18px", background: "rgba(0,0,0,0.25)", borderRadius: "20px", overflow: "hidden", height: "10px" }}>
                      <div style={{ height: "100%", background: remaining < 0 ? "#ff4444" : "linear-gradient(90deg, #fbbf24, #f472b6)", width: `${Math.min((totalSpent / salary) * 100, 100)}%`, borderRadius: "20px", transition: "width 0.6s ease" }} />
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", marginTop: "10px" }}>
                      <div style={{ fontSize: "13px", fontWeight: 700 }}>Spent: <span style={{ color: "#fbbf24", fontWeight: 900 }}>AED {totalSpent.toFixed(2)}</span></div>
                      <div style={{ fontSize: "13px", fontWeight: 700 }}>Left: <span style={{ color: remaining < 0 ? "#ff6464" : "#6ee7b7", fontWeight: 900 }}>AED {remaining.toFixed(2)}</span></div>
                    </div>
                  </div>
                )}

                {salary && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "8px", marginBottom: "16px" }}>
                    {[
                      { label: "Today", value: `AED ${getDailyExpenses().reduce((s, e) => s + e.amount, 0).toFixed(0)}`, icon: "📅" },
                      { label: "This Week", value: `AED ${getWeeklyExpenses().reduce((s, e) => s + e.amount, 0).toFixed(0)}`, icon: "📊" },
                      { label: "Guilty", value: guiltyExpenses.length, icon: "😬" },
                      { label: "Savings", value: `AED ${totalSavings.toFixed(0)}`, icon: "🏦" },
                    ].map(stat => (

              <input value={expenseForm.name} onChange={e => setExpenseForm(f => ({ ...f, name: e.target.value }))} placeholder="e.g. Coffee, Shoes, Rent..." style={inputStyle} />
              <label style={{ ...labelStyle, marginTop: "14px" }}>Amount (AED)</label>
              <input value={expenseForm.amount} onChange={e => setExpenseForm(f => ({ ...f, amount: e.target.value }))} type="number" placeholder="0.00" style={inputStyle} />
              {parseFloat(expenseForm.amount) >= GUILTY_THRESHOLD && !FIXED_COST_CATEGORIES.includes(expenseForm.category) && (
                <div style={{ background: "rgba(255,200,0,0.1)", border: "1px solid rgba(255,200,0,0.28)", borderRadius: "10px", padding: "10px 13px", marginTop: "8px", fontSize: "12px", color: "#fbbf24", fontWeight: 800 }}>⚠️ Over AED 500! Mewe, you'll be asked to explain yourself 😂</div>
              )}
              <label style={{ ...labelStyle, marginTop: "14px" }}>Category</label>
              <select value={expenseForm.category} onChange={e => setExpenseForm(f => ({ ...f, category: e.target.value }))} style={{ ...inputStyle, WebkitAppearance: "none", appearance: "none" }}>
                {categories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              {FIXED_COST_CATEGORIES.includes(expenseForm.category) && (
                <div style={{ background: "rgba(168,85,247,0.1)", border: "1px solid rgba(168,85,247,0.22)", borderRadius: "10px", padding: "10px 13px", marginTop: "8px", fontSize: "12px", color: "#c4b5fd", fontWeight: 800 }}>🔒 Fixed cost — no AED 500 warning for this category</div>
              )}
              <label style={{ ...labelStyle, marginTop: "14px" }}>Date</label>
              <input value={expenseForm.date} onChange={e => setExpenseForm(f => ({ ...f, date: e.target.value }))} type="date" style={inputStyle} />
              <button onClick={addExpense} style={{ ...btnPrimary, marginTop: "20px" }}>Add Expense 💸</button>
            </Modal>
          )}

          {/* DELETE MODAL */}
          {showDeleteModal && (
            <Modal onClose={() => setShowDeleteModal(null)}>
              <div style={{ fontSize: "52px", textAlign: "center" }}>🚨</div>
              <div style={{ fontSize: "18px", fontWeight: 900, textAlign: "center", margin: "12px 0 8px", color: "#f472b6" }}>Hold on bestie!</div>
              <div style={{ fontSize: "15px", textAlign: "center", color: "rgba(255,255,255,0.8)", lineHeight: 1.65, marginBottom: "8px", fontWeight: 700 }}>{deleteMsg}</div>
              <div style={{ fontSize: "13px", textAlign: "center", color: "rgba(255,255,255,0.38)", marginBottom: "22px", fontWeight: 600 }}>Deleting won't bring the money back! 😂</div>
              <div style={{ display: "flex", gap: "10px" }}>
                <button onClick={() => setShowDeleteModal(null)} style={{ ...btnSecondary, flex: 1 }}>Keep it 😇</button>
                <button onClick={() => confirmDelete(showDeleteModal)} style={{ flex: 1, background: "rgba(255,80,80,0.16)", border: "1.5px solid rgba(255,80,80,0.32)", borderRadius: "14px", padding: "13px", color: "#ff9090", fontSize: "14px", fontWeight: 800, cursor: "pointer", fontFamily: "'Nunito', sans-serif" }}>Delete 🗑️</button>
              </div>
            </Modal>
          )}

          {/* GUILTY MODAL */}
          {showGuiltyModal && (
            <Modal onClose={() => { setExpenses(p => [{ ...showGuiltyModal, guilty: false }, ...p]); setShowGuiltyModal(null); }}>
              <div style={{ fontSize: "52px", textAlign: "center" }}>😳</div>
              <div style={{ fontSize: "18px", fontWeight: 900, textAlign: "center", margin: "10px 0 4px", color: "#fbbf24" }}>AED {parseFloat(showGuiltyModal.amount).toFixed(2)}?!</div>
              <div style={{ fontSize: "14px", textAlign: "center", color: "rgba(255,255,255,0.8)", lineHeight: 1.65, marginBottom: "6px", fontWeight: 700 }}>{guiltyMsg}</div>
              <div style={{ fontSize: "17px", fontWeight: 900, textAlign: "center", marginBottom: "22px", color: "#f0e6ff" }}>Was it worth it? 🤔</div>
              <div style={{ display: "flex", gap: "8px" }}>
                {[
                  { r: "yes", label: "Yes! 💅", sub: "I regret nothing", bg: "rgba(52,211,153,0.13)", border: "rgba(52,211,153,0.3)", color: "#6ee7b7" },
                  { r: "no", label: "No 😐", sub: "It happened", bg: "rgba(96,165,250,0.13)", border: "rgba(96,165,250,0.28)", color: "#93c5fd" },
                  { r: "guilty", label: "Guilty 😬", sub: "Send help", bg: "rgba(255,80,80,0.13)", border: "rgba(255,80,80,0.28)", color: "#ff9090" },
                ].map(btn => (
                  <button key={btn.r} onClick={() => handleGuiltyResponse(btn.r, showGuiltyModal)} style={{ flex: 1, background: btn.bg, border: `1.5px solid ${btn.border}`, borderRadius: "14px", padding: "14px 6px", color: btn.color, fontSize: "13px", fontWeight: 900, cursor: "pointer", fontFamily: "'Nunito', sans-serif", textAlign: "center" }}>
                    {btn.label}<br /><span style={{ fontSize: "10px", fontWeight: 700, opacity: 0.65 }}>{btn.sub}</span>
                  </button>
                ))}
              </div>
            </Modal>
          )}

          {/* SAVINGS ADJUST MODAL */}
          {showSavingsAdjust && (
            <Modal onClose={adjustSavings}>
              <div style={{ fontSize: "52px", textAlign: "center" }}>🏦</div>
              <div style={{ fontSize: "20px", fontWeight: 900, textAlign: "center", margin: "10px 0 6px", color: "#6ee7b7" }}>You saved money! 🎉</div>
              <div style={{ fontSize: "13px", textAlign: "center", color: "rgba(255,255,255,0.55)", marginBottom: "20px", fontWeight: 700 }}>AED {showSavingsAdjust.amount.toFixed(2)} leftover from last month. Adjust if needed:</div>
              <label style={labelStyle}>Savings Amount (AED)</label>
              <input value={savingsAdjustInput} onChange={e => setSavingsAdjustInput(e.target.value)} type="number" style={inputStyle} />
              <button onClick={adjustSavings} style={{ ...btnPrimary, marginTop: "16px", background: "linear-gradient(135deg, #059669, #10b981)" }}>Confirm Savings 🏦</button>
            </Modal>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
